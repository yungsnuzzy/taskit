<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{APP_NAME}} - Groceries</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon-precomposed" href="/apple-touch-icon-precomposed.png" />
    <meta name="theme-color" content="#f2f1e9" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="{{APP_NAME}}" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="stylesheet" href="styles.css?v={{APP_ASSET_VERSION}}" />
  </head>
  <body>
    <div class="app-shell">
      <aside id="left-sidebar" class="sidebar hidden-left">
        <nav class="panel nav-panel" aria-label="Main navigation">
          <h2>options</h2>
          <a href="/" class="nav-link">Today</a>
          <a href="/rolling.html" class="nav-link">Rolling Tasks</a>
          <a href="/calendar.html" class="nav-link">Calendar</a>
          <a href="/completed.html" class="nav-link">Completed Items</a>
          <a href="/task-management.html" class="nav-link">Settings</a>

          <div class="sidebar-tools" aria-label="Display controls">
            <p class="tools-title">Display</p>
            <div class="tool-row scale-controls">
              <button id="text-smaller" type="button" class="tool-btn" aria-label="Smaller text">a</button>
              <button id="text-reset" type="button" class="tool-btn" aria-label="Reset text size">↺</button>
              <button id="text-bigger" type="button" class="tool-btn" aria-label="Bigger text">A</button>
            </div>
            <div class="tool-row">
              <button id="theme-bright" type="button" class="tool-btn" aria-label="Bright theme">Bright</button>
              <button id="theme-dark" type="button" class="tool-btn" aria-label="Dark theme">Dark</button>
            </div>
            <div class="tool-row single">
              <button id="toggle-debug" type="button" class="tool-btn" aria-label="Toggle debug panel">Debug: Off</button>
            </div>
          </div>
        </nav>
      </aside>

      <div class="layout">
        <main class="main-content">
          <header class="top-bar">
            <div class="brand-block">
              <button id="sidebar-toggle" type="button" class="sidebar-arrow" aria-label="Open menu">☰</button>
              <div class="brand-copy">
                <h1>
                  <a href="/" class="home-title-link" aria-label="{{APP_NAME}} home">
                    <img src="/icons/bright-wordmark.png" alt="{{APP_NAME}}" class="home-wordmark home-wordmark-bright" />
                    <img src="/icons/dark-wordmark.png" alt="{{APP_NAME}}" class="home-wordmark home-wordmark-dark" />
                  </a>
                </h1>
                <p class="subtitle">{{APP_TAGLINE}}</p>
              </div>
            </div>
            <div class="view-toggle">
              <a href="/" class="toggle-link">Tasks</a>
              <span class="toggle-sep">/</span>
              <a href="/groceries.html" class="toggle-link active">Groceries</a>
            </div>
            <div class="clock-panel">
              <p id="weekday" class="weekday">Monday</p>
              <p id="date" class="date">January 1, 2026</p>
              <p id="time" class="time">12:00:00 PM</p>
            </div>
          </header>

          <section class="panel panel-groceries">
            <div class="panel-heading">
              <h2>Grocery List</h2>
              <p id="groceries-count" class="count">0 items</p>
            </div>
            <ul id="groceries-list" class="task-list"></ul>
          </section>
        </main>
      </div>
    </div>

    <button id="open-grocery-modal" class="fab" type="button" aria-label="Add grocery item">+</button>

    <div id="grocery-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="grocery-modal-title">
      <div class="modal-backdrop" id="grocery-modal-backdrop"></div>
      <section class="modal-card">
        <div class="modal-head">
          <h2 id="grocery-modal-title">Add Grocery Item</h2>
          <button id="close-grocery-modal" type="button" class="modal-close" aria-label="Close grocery form">×</button>
        </div>

        <form id="grocery-form">
          <label>
            Item name
            <input id="grocery-title" type="text" maxlength="120" required />
          </label>

          <label>
            Category
            <select id="grocery-category" required>
              <option value="Grocery Store">Grocery Store</option>
              <option value="Costco">Costco</option>
              <option value="Other">Other</option>
            </select>
          </label>

          <button type="submit">Add item</button>
        </form>
        <p id="grocery-form-error" class="form-error"></p>
      </section>
    </div>

    <script src="app.js?v={{APP_ASSET_VERSION}}"></script>
  </body>
</html>
