name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and start services
        run: |
          docker compose build
          docker compose up -d

      - name: Tag image
        run: |
          if docker image inspect taskit-taskit > /dev/null 2>&1; then
            docker tag taskit-taskit taskit/taskit:latest
          else
            echo "taskit-taskit not found; compose already built taskit/taskit:latest"
          fi

      - name: Push image
        run: docker push taskit/taskit:latest
